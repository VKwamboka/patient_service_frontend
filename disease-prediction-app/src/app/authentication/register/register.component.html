<div class="main_signup bg-secondary">
    <div class="container bg-secondary d-flex justify-content-center align-items-center min-vh-100 ">
      <div class="row shadow-lg rounded-2 overflow-hidden signup-wrapper ">
        
        <!-- Left side: Image -->
        <div class="col-md-6 p-0">
          <img src="/AIDOC.webp" alt="Health Illustration" class="img-fluid object-fit-cover" />
        </div>
  
        <!-- Right side: Signup Form -->
        <div class="col-md-6 p-5 bg-white d-flex flex-column justify-content-center">
          <div class="signup-card mx-auto" style="max-width: 420px; width: 100%;">
            <h1 class="text-primary mb-3">Create Account</h1>
            <p class="text-secondary mb-4">Join us to get your personalized health insights.</p>

            <div class="mb-4">
                <label class="form-label d-block">Registering as:</label>
              
                <!-- <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="role" id="doctor" value="doctor"
                         [checked]="role === 'doctor'" (change)="onRoleChange('doctor')">
                  <label class="form-check-label" for="doctor">Doctor</label>
                </div> -->
              
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="role" id="patient" value="patient"
                         [checked]="role === 'patient'" (change)="onRoleChange('patient')">
                  <label class="form-check-label" for="patient">Patient</label>
                </div>
              </div>
              
  
            <form #signupForm="ngForm" (ngSubmit)="onSubmit(signupForm)" novalidate>
              <!-- First Name -->
              <div class="mb-3">
                <input name="firstName" type="text" placeholder="First Name"
                  class="form-control" [(ngModel)]="userData.profile.firstName" (ngModelChange)="clearError()"
                  required #firstNameRef="ngModel" />
                <div *ngIf="firstNameRef.invalid && firstNameRef.touched" class="text-danger">
                  <small>First name is required.</small>
                </div>
              </div>

              <!-- Last Name -->
              <div class="mb-3">
                <input name="lastName" type="text" placeholder="Last Name"
                  class="form-control" [(ngModel)]="userData.profile.lastName" (ngModelChange)="clearError()"
                  required #lastNameRef="ngModel" />
                <div *ngIf="lastNameRef.invalid && lastNameRef.touched" class="text-danger">
                  <small>Last name is required.</small>
                </div>
              </div>

              <!-- Username -->
              <div class="mb-3">
                <input name="username" type="text" placeholder="Username"
                  class="form-control" [(ngModel)]="userData.profile.username" (ngModelChange)="clearError()"
                  required #usernameRef="ngModel" />
                <div *ngIf="usernameRef.invalid && usernameRef.touched" class="text-danger">
                  <small>Username is required.</small>
                </div>
              </div>

              <!-- Email -->
              <div class="mb-3">
                <input name="email" type="email" placeholder="Enter Email"
                  class="form-control" [(ngModel)]="userData.email" (ngModelChange)="clearError()"
                  required email #emailRef="ngModel" />
                <div *ngIf="emailRef.invalid && emailRef.touched" class="text-danger">
                  <small *ngIf="emailRef.errors?.['required']">Email is required.</small>
                  <small *ngIf="emailRef.errors?.['email']">Enter a valid email.</small>
                </div>
              </div>

              <!-- Password -->
              <div class="mb-3">
                <input name="password" type="password" placeholder="Password"
                  class="form-control" [(ngModel)]="userData.password" (ngModelChange)="clearError()"
                  required minlength="5" #passRef="ngModel" />
                <div *ngIf="passRef.invalid && passRef.touched" class="text-danger">
                  <small *ngIf="passRef.errors?.['required']">Password is required.</small>
                  <small *ngIf="passRef.errors?.['minlength']">Min 5 characters.</small>
                </div>
              </div>

              <!-- Confirm Password -->
              <!-- <div class="mb-3">
                <input name="confirmPassword" type="password" placeholder="Confirm Password"
                  class="form-control" [(ngModel)]="confirmPassword"
                  required minlength="6" #confirmPassRef="ngModel" />
                <div *ngIf="confirmPassRef.invalid && confirmPassRef.touched" class="text-danger">
                  <small *ngIf="confirmPassRef.errors?.['required']">Confirm Password is required.</small>
                  <small *ngIf="confirmPassRef.errors?.['minlength']">Min 6 characters.</small>
                </div>
              </div> -->

              <!-- Profile Picture (optional) -->
              <div class="mb-3">
                <input name="profilePicture" type="url" placeholder="Profile Picture URL (optional)"
                  class="form-control" [(ngModel)]="userData.profile.profilePicture" (ngModelChange)="clearError()" />
              </div>

              <!-- error message -->
              <div *ngIf="errorMessage" class="alert alert-danger">
                {{ errorMessage }}
              </div>

              <!-- Submit -->
              <button type="submit" class="btn btn-primary w-100" [disabled]="signupForm.invalid">
                {{ loading ? 'Creating account...' : 'Sign up' }}
              </button>
            </form>

            <div class="mt-3 text-center">
                <p class="text-secondary mb-0">Already have an account? <a (click)="goToLogin()" class="text-primary">Login here</a></p>
            </div>
          </div>
        </div>
        
      </div>
    </div>
  </div>
