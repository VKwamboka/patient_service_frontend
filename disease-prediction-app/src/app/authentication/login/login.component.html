<div class="main_login">
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="row shadow-lg rounded-2 overflow-hidden login-wrapper">
      
      <!-- Left side: Form card -->
      <div class="col-md-6 p-5 bg-white d-flex flex-column justify-content-center">
        <div class="login-card mx-auto" style="max-width: 420px; width: 100%;">
          <h1 class="text-primary mb-3">Welcome Back!</h1>
          <p class="text-secondary mb-4">Please enter your credentials to access your account.</p>

          <div class="mb-4">
            <!-- <label class="form-label d-block">Logging in as:</label> -->
          
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="role" id="doctor" value="doctor"
                     [checked]="role === 'doctor'" (change)="onRoleChange('doctor')">
              <label class="form-check-label" for="doctor">Doctor</label>
            </div>
          
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="role" id="patient" value="patient"
                     [checked]="role === 'patient'" (change)="onRoleChange('patient')">
              <label class="form-check-label" for="patient">Patient</label>
            </div>
          </div>

          <form #loginForm="ngForm" (ngSubmit)="onSubmit()" novalidate>
            <div class="mb-3">
              <label>Email:</label>
              <input name="email" type="email" class="form-control" [(ngModel)]="user.email" required email #emailRef="ngModel" />
              <div *ngIf="emailRef.invalid && emailRef.touched" class="text-danger">
                <small *ngIf="emailRef.errors?.['required']">Email is required.</small>
                <small *ngIf="emailRef.errors?.['email']">Enter a valid email.</small>
              </div>
            </div>

            <div class="mb-3">
              <label>Password:</label>
              <input name="password" type="password" class="form-control" [(ngModel)]="user.password" required minlength="6" #passRef="ngModel" />
              <div *ngIf="passRef.invalid && passRef.touched" class="text-danger">
                <small *ngIf="passRef.errors?.['required']">Password is required.</small>
                <small *ngIf="passRef.errors?.['minlength']">Min 6 characters.</small>
              </div>
            </div>

            <div class="mb-4">
              <a routerLink="/forgot-password" class="text-primary">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid">
              Sign In
            </button>

            <div class="mt-3 text-center">
              <p class="text-secondary mb-0">Don't have an account? <a (click)="goToSignup()"  class="text-primary">Sign up for free!</a></p>
            </div>
          </form>
        </div>
      </div>

      <!-- Right side: Image -->
      <div class="col-md-6 p-0">
        <img src="/AIDOC.webp" alt="Health Illustration" class="iimg-fluid object-fit-cover" />
      </div>
      
    </div>
  </div>
</div>
