<div class="main_login">
  <div class="container d-flex justify-content-center align-items-center min-vh-100 " >
    <div class="row align-items-center">
        <div class="col-md-6 text-left">
          <h1 class="text-primary">Welcome Back!</h1>
          <p class="text-secondary">Please enter your credentials to access your account.</p>
          <div class="login-box mt-4 p-4 shadow">
            <form #loginForm="ngForm" (ngSubmit)="onSubmit()" novalidate>
              <div class="mb-3">
                <label>Email:</label>
                <input
                  name="email"
                  type="email"
                  class="form-control"
                  [(ngModel)]="user.email"
                  required
                  email
                  #emailRef="ngModel"
                />
                <div *ngIf="emailRef.invalid && emailRef.touched" class="text-danger">
                  <small *ngIf="emailRef.errors?.['required']">Email is required.</small>
                  <small *ngIf="emailRef.errors?.['email']">Enter a valid email.</small>
                </div>
              </div>
          
              <div class="mb-3">
                <label>Password:</label>
                <input
                  name="password"
                  type="password"
                  class="form-control"
                  [(ngModel)]="user.password"
                  required
                  minlength="6"
                  #passRef="ngModel"
                />
                <div *ngIf="passRef.invalid && passRef.touched" class="text-danger">
                  <small *ngIf="passRef.errors?.['required']">Password is required.</small>
                  <small *ngIf="passRef.errors?.['minlength']">Min 6 characters.</small>
                </div>
              </div>
              <!-- forgot password -->
              <div class="mb-4">
                <a routerLink="/forgot-password" class="text-primary">Forgot Password?</a>
              </div>


              <button type="submit" class="btn btn-primary" [disabled]="loginForm.invalid">
                Sign In
              </button>
              <div class="mt-3">
                <p class="text-secondary">Don't have an account? <a routerLink="/register" class="text-primary">sign up for free!</a></p>
              </div>
            </form>
          </div>
          
        </div>
        <div class="col-md-6 text-center ">
          <img src="/AIDOC.webp" alt="Health Illustration" class="img-fluid landing-image">
        </div>
        

    </div>
</div>

</div>
