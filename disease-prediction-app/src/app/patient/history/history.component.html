<div class="container mt-4">
    <h4>My Health History</h4>
    <p class="text-muted">View your past symptom evaluations and appointments.</p>
  
    <!-- Symptom History Section -->
    
    <div *ngIf="symptomHistory.length > 0; else noSymptoms">
      <h5 class="mt-4">Symptom Evaluations</h5>
      <div *ngFor="let entry of symptomHistory" class="card mb-3 shadow-sm">
        <div class="card-header bg-light">
          <strong>{{ entry.date }}</strong>
        </div>
        <div class="card-body">
          <p><strong>Symptoms:</strong></p>
          <ul>
            <li *ngFor="let symptom of entry.symptoms">{{ symptom }}</li>
          </ul>
          <p><strong>Predictions:</strong></p>
          <ul>
            <li *ngFor="let pred of entry.predictions">{{ pred }}</li>
          </ul>
        </div>
      </div>
    </div>
    <ng-template #noSymptoms>
      <p class="text-muted text-center mt-3 ">😕 No symptom records found.</p>
    </ng-template>
