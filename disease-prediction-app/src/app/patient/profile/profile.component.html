<div class="container mt-4">
  <div class="d-flex align-items-center gap-4 mb-4">
    <!-- Profile Picture or Icon -->
    <div class="profile-picture">
      <img *ngIf="profile.profilePicture; else noPic" [src]="profile.profilePicture" alt="Profile Picture" class="rounded-circle" />
      <ng-template #noPic>
        <!-- <mat-icon class="mat-icon-lg">account_circle</mat-icon> -->
        <mat-icon class="mat-icon-lg" aria-hidden="false"   fontIcon="person"></mat-icon>

      </ng-template>
    </div>

    <!-- Name + Edit Button -->
    <div>
      <h4>{{ profile.firstName }} {{ profile.lastName }}</h4>
      <p class="text-muted">{{ profile.username }}</p>
    </div>

    <div class="ms-auto">
      <button mat-button class="primary" (click)="toggleEdit()">
        <mat-icon>{{ editMode ? 'save' : 'edit' }}</mat-icon>
        {{ editMode ? 'Save' : 'Edit' }}
      </button>
    </div>
  </div>

  <!-- Profile Info -->
  <div class="row g-3">
    <div class="col-md-6">
      <label>Email:</label>
      <p class="form-control-plaintext">{{ profile.email }}</p>
    </div>

    <div class="col-md-6">
      <label>Phone Number:</label>
      <ng-container *ngIf="!editMode; else editPhone">
        <p class="form-control-plaintext">{{ profile.phoneNumber || 'N/A' }}</p>
      </ng-container>
      <ng-template #editPhone>
        <input type="text" [(ngModel)]="profile.phoneNumber" class="form-control" />
      </ng-template>
    </div>

    <div class="col-md-6">
      <label>Username:</label>
      <ng-container *ngIf="!editMode; else editUsername">
        <p class="form-control-plaintext">{{ profile.username }}</p>
      </ng-container>
      <ng-template #editUsername>
        <input type="text" [(ngModel)]="profile.username" class="form-control" />
      </ng-template>
    </div>
  </div>
</div>
