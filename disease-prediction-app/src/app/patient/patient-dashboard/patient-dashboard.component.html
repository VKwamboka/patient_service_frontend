<div [ngClass]="theme" class="dashboard-container d-flex flex-column min-vh-100">
    <!-- Top Bar (Mobile View Toggle + Dark Mode Switch) -->
    <header class="d-flex justify-content-between align-items-center p-3 bg-body-secondary shadow-sm">
      <button class="btn btn-primary d-md-none" (click)="toggleSidebar()">
        <i class="bi bi-list"></i>
      </button>
  
      <span class="fw-semibold">Patient Portal</span>
  
      <!-- <button class="btn btn-outline-secondary" (click)="toggleTheme()">
        <i [ngClass]="theme === 'dark-mode' ? 'bi bi-moon-fill' : 'bi bi-sun-fill'"></i>
      </button> -->
      <nav class="d-flex justify-content-end ">
        <app-notifications></app-notifications>
      </nav>
      

      
    </header>
  
    <div class="d-flex flex-grow-1">
      <!-- Sidebar -->
      <nav [class.collapsed]="isSidebarCollapsed"
           class="sidebar bg-primary text-white p-3 d-md-block"
           [ngClass]="{ 'd-none': isSidebarCollapsed && isMobile }">
  
        <ul class="nav flex-column">
          <li class="nav-item" *ngFor="let item of menu">
            <a class="nav-link text-white"
               routerLink="{{item.route}}"
               routerLinkActive="active"
               [routerLinkActiveOptions]="{ exact: true }">
              <i [class]="item.icon + ' me-2'"></i>{{ item.label }}
            </a>
          </li>
          <li class="nav-item mt-3">
            <button class="btn btn-outline-light w-100"><i class="bi bi-box-arrow-right me-2"></i>Logout</button>
          </li>
        </ul>
      </nav>
  
      <!-- Main content -->
      <div class="flex-grow-1 p-4 bg-light content-area">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
